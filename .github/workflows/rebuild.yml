name: Scheduled rebuild

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy hook
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "::error::CF_DEPLOY_HOOK_URL secret is not set. Skipping."
            exit 1
          fi
          curl -fsS -X POST "$DEPLOY_HOOK_URL"
        env:
          DEPLOY_HOOK_URL: ${{ secrets.CF_DEPLOY_HOOK_URL }}
